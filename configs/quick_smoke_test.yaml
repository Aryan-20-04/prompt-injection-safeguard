run:
  name: smoke-test
  seed: 42
  output_dir: results/smoke_test
  device: cpu
  batch_size: 8

datasets:
  - id: smooth3-prompt-injection
    split: validation
    max_samples: 100

models:
  - id: distilbert-injection-detector
    model_name: distilbert-base-uncased
    max_len: 128

labels:
  - BENIGN
  - JAILBREAK
  - INSTRUCTION_OVERRIDE
  - ROLE_HIJACK
  - DATA_EXFILTRATION

metrics:
  - micro_f1
  - macro_f1
  - per_class_f1
  - precision
  - recall