# =============================================================================
#  Prompt Injection Benchmark — Full Config
#
#  Split into two runs to avoid OOM on T4:
#    Encoders:  python scripts/run_benchmark.py --config configs/benchmark.yaml
#    LLMs:      python scripts/run_benchmark.py --config configs/llm_run.yaml
# =============================================================================

run:
  output_dir: runs/encoders_run
  device: auto
  batch_size: 32
  seed: 42
  eval_mode: binary

suite: prompt_injection

labels:
  - BENIGN
  - JAILBREAK

models:

  # ── Guard models (purpose-built, best performers) ────────────────────
  - id: kiwi_guard
    model_name: protectai/deberta-v3-base-prompt-injection
    max_len: 512

  - id: laiyer_guard
    model_name: laiyer/deberta-v3-base-prompt-injection-v1
    max_len: 512

  # ── Fine-tuned encoders ──────────────────────────────────────────────
  - id: distilbert_finetuned
    model_name: fmops/distilbert-prompt-injection
    max_len: 512

  - id: roberta_injection
    model_name: deepset/deberta-v3-base-injection
    max_len: 512

  # ── API models (uncomment after setting env vars) ────────────────────
  # Set OPENAI_API_KEY / ANTHROPIC_API_KEY before enabling these
  # - id: openai_guard
  #   model_name: gpt-4o-mini
  # - id: anthropic_guard
  #   model_name: claude-haiku-4-5