# configs/default.yaml
run:
  name: default-run
  seed: 42
  output_dir: results/default
  device: auto          # auto = cuda if available else cpu
  batch_size: 32

datasets:
  - id: smooth3-prompt-injection
    split: validation
    max_samples: null

models:
  - id: distilbert-injection-detector
    model_name: distilbert-base-uncased
    max_len: 256
    epochs: 3
    learning_rate: 2e-5
labels:
  - BENIGN
  - JAILBREAK
  - INSTRUCTION_OVERRIDE
  - ROLE_HIJACK
  - DATA_EXFILTRATION

metrics:
  - micro_f1
  - macro_f1
  - per_class_f1
  - precision
  - recall