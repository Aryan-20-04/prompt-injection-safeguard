# =============================================================================
#  Additional / custom benchmark suites
#
#  These are merged into the built-in SUITES dict at runner startup.
#  Add your own suite here without touching Python code.
# =============================================================================

suites:

  # Full research suite across all 4 datasets
  prompt_injection_full:
    - hf_name: Smooth-3/llm-prompt-injection-attacks
      split: validation
      text_field: text
      label_field: labels
      max_samples: null

    - hf_name: qq8933/PromptBench
      split: test
      text_field: content
      label_field: label
      max_samples: 500

    - hf_name: walledai/AdvBench
      split: train
      text_field: prompt
      label_field: label
      max_samples: 500
      label_map:
        "0": BENIGN
        "1": JAILBREAK

    - hf_name: JailbreakBench/JBB-Behaviors
      split: train
      text_field: Goal
      label_field: Category
      max_samples: 500

  # Minimal 50-sample CI smoke test
  smoke:
    - hf_name: Smooth-3/llm-prompt-injection-attacks
      split: validation
      text_field: text
      label_field: labels
      max_samples: 50
