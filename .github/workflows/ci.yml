# .github/workflows/ci.yml
name: Benchmark CI

on:
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }

      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate new plugins (if any)
        run: |
          git diff --name-only origin/main..HEAD | grep "bench/models/" | while read f; do
            python scripts/validate_plugin.py --model $(basename $f .py)
          done

      - name: Run smoke test benchmark
        run: python -m bench.run --config configs/quick_smoke_test.yaml

      - name: Post results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const md = fs.readFileSync('results/smoke_test/leaderboard.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Benchmark smoke test results\n\n${md}`
            });